name: preflight

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  tone-guard:
    name: tone guard (banned words)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compute BASE / HEAD SHAs
        id: sha
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            BASE=$(git rev-list --max-parents=0 HEAD | tail -1)
          fi
          echo "base=$BASE" >> "$GITHUB_OUTPUT"
          echo "head=$HEAD" >> "$GITHUB_OUTPUT"

      - name: Generate unified diff (added lines only, excluding docs/templates)
        run: |
          # docs/templates/* contain FILL IN placeholder text which would
          # false-positive the tone guard. They are not published pages.
          git diff --unified=0 -M \
            "${{ steps.sha.outputs.base }}" "${{ steps.sha.outputs.head }}" \
            -- . ':(exclude)docs/templates/**' \
            > pr.diff
          echo "diff size: $(wc -l < pr.diff) lines"

      - name: Run tone guard (diff mode — added lines only)
        run: |
          python scripts/tone_guard.py --diff-from pr.diff

  preflight:
    name: preflight (PII + link check)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run preflight self-test (PII regex regressions)
        run: |
          python scripts/preflight.py --self-test

      - name: Determine changed files
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            BASE=$(git rev-list --max-parents=0 HEAD | tail -1)
          fi
          # Scan .md and .html, but SKIP docs/templates/* — those files
          # contain placeholder URLs and FILL IN markers that would fail
          # the link and PII checks for no real reason (they are not
          # served). Authors start from these files but the output is
          # always placed under /guidelines/<topic>/ and gets its own scan.
          git diff --name-only --diff-filter=AM "$BASE" "$HEAD" \
            | grep -Ei '\.(md|html)$' \
            | grep -vE '^docs/templates/' > changed.txt || true
          echo "count=$(wc -l < changed.txt | tr -d ' ')" >> "$GITHUB_OUTPUT"
          cat changed.txt

      - name: Compute BASE / HEAD SHAs
        id: sha
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            BASE=$(git rev-list --max-parents=0 HEAD | tail -1)
          fi
          echo "base=$BASE" >> "$GITHUB_OUTPUT"
          echo "head=$HEAD" >> "$GITHUB_OUTPUT"

      - name: Generate unified diff for external link check
        run: |
          git diff --unified=0 -M \
            "${{ steps.sha.outputs.base }}" "${{ steps.sha.outputs.head }}" \
            -- . ':(exclude)docs/templates/**' \
            > pr.diff

      - name: Run preflight (diff mode for external link check)
        if: steps.changed.outputs.count != '0'
        run: |
          python scripts/preflight.py \
            --files-from changed.txt \
            --diff-from pr.diff
