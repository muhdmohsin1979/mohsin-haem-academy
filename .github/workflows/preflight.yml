name: preflight

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  tone-guard:
    name: tone guard (banned words)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Determine changed files
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi
          # guard against first push with no parent
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            BASE=$(git rev-list --max-parents=0 HEAD | tail -1)
          fi
          git diff --name-only --diff-filter=AM "$BASE" "$HEAD" \
            | grep -Ei '\.(md|html)$' > changed.txt || true
          echo "count=$(wc -l < changed.txt | tr -d ' ')" >> "$GITHUB_OUTPUT"
          cat changed.txt

      - name: Run tone guard
        if: steps.changed.outputs.count != '0'
        run: |
          python scripts/tone_guard.py --files-from changed.txt

  preflight:
    name: preflight (PII + link check)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Determine changed files
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            BASE=$(git rev-list --max-parents=0 HEAD | tail -1)
          fi
          git diff --name-only --diff-filter=AM "$BASE" "$HEAD" \
            | grep -Ei '\.(md|html)$' > changed.txt || true
          echo "count=$(wc -l < changed.txt | tr -d ' ')" >> "$GITHUB_OUTPUT"
          cat changed.txt

      - name: Run preflight
        if: steps.changed.outputs.count != '0'
        run: |
          python scripts/preflight.py --files-from changed.txt
